<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Титульник - Чудновский З.А. ИУ5Ц-11М</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="dist/bootstrap/style.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(135deg, #a0d8ef, #007bff);
        color: #fff;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      nav.navbar {
        background: linear-gradient(90deg, #48a9fe, #007bff);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      nav .nav-link {
        color: white !important;
        font-weight: 600;
        transition: color 0.3s ease, border-bottom 0.3s ease;
      }
      nav .nav-link:hover,
      nav .nav-link.active {
        color: #cce4ff !important;
        border-bottom: 3px solid #cce4ff;
      }
      .header-container {
        margin: 3rem auto 6rem;
        max-width: 480px;
        text-align: center;
        animation: fadeIn 1.6s ease-in-out forwards;
        opacity: 0;
      }
      .header-container img {
        max-width: 400px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      h1 {
        font-family: "Times New Roman", serif;
        font-size: 2.8rem;
        font-weight: 700;
        margin-top: 1rem;
        text-shadow: 2px 2px 6px rgba(0, 0, 50, 0.7);
      }
      .info-box {
        background: rgba(255 255 255 / 0.15);
        margin: 0 auto 5rem;
        padding: 2rem 2.5rem;
        border-radius: 14px;
        box-shadow: 0 10px 36px rgb(0 0 0 / 0.18);
        max-width: 380px;
        font-size: 1.2rem;
        text-align: center;
        backdrop-filter: blur(10px);
        animation: fadeIn 3s ease-in-out forwards;
        opacity: 0;
      }
      .info-box strong {
        display: block;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      footer {
        text-align: center;
        color: #ddd;
        padding: 1rem 0;
        background: rgba(0, 123, 255, 0.25);
        font-size: 0.9rem;
        font-weight: 100;
        font-family: "Roboto", sans-serif;
        backdrop-filter: blur(12px);
        flex-shrink: 0;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="title.html"
          >Чудновский З.А. ИУ5Ц-11М</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Переключить навигацию"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="title.html"
                >Титульник</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="scheme.html">Схема</a>
            </li>
            
            <li class="nav-item">
              <a class="nav-link" href="calculations.html">Вычисления</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="header-container">
      <img src="Титульник.png" alt="Титульник" />
    </div>

    <footer>
      МГТУ им. Н. Э. Баумана · ИУ5Ц-11М · Чудновский Захар Александрович · 2025
      г.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
